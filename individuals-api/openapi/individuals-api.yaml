openapi: 3.0.0
info:
  title: Individuals API
  description: REST API для регистрации, логина, обновления токена и получения информации о пользователе через Keycloak.
  version: 1.0.0
servers:
  - url: http://localhost:8081/v1

paths:
  /auth/registration:
    post:
      summary: Регистрация пользователя
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRegistrationRequest'
      responses:
        '201':
          description: Успешная регистрация
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '400':
          description: Ошибка валидации
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Пользователь уже существует
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/login:
    post:
      summary: Аутентификация пользователя
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserLoginRequest'
      responses:
        '200':
          description: Успешная аутентификация
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '401':
          description: Неверный логин или пароль
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/refresh-token:
    post:
      summary: Обновление токена доступа
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
      responses:
        '200':
          description: Токен успешно обновлён
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '401':
          description: Недействительный или просроченный refresh token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/me:
    get:
      summary: Получение данных текущего пользователя
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Данные пользователя
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserInfoResponse'
        '401':
          description: Недействительный токен
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Пользователь не найден
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    UserRegistrationRequest:
      type: object
      required:
        - email
        - password
        - confirm_password
        - profile
      properties:
        email:
          type: string
          format: email
        password:
          type: string
        confirm_password:
          type: string
        profile:
          type: object
          required:
            - passport_number
            - phone_number
            - email
            - first_name
            - last_name
            - secret_key
            - address
          properties:
            passport_number:
              type: string
              description: Номер паспорта
              example: AB123456
            phone_number:
              type: string
              description: Номер телефона
              example: "+79001234567"
            email:
              type: string
              format: email
              description: Email пользователя, используется как логин в Keycloak
              example: john.doe@example.com
            first_name:
              type: string
              maxLength: 32
              description: Имя
              example: John
            last_name:
              type: string
              maxLength: 32
              description: Фамилия
              example: Doe
            secret_key:
              type: string
              maxLength: 32
              description: Секретный ключ для идентификации клиента
              example: my-secret-key
            address:
              type: object
              required:
                - address
                - zip_code
                - city
                - state
                - country
              properties:
                address:
                  type: string
                  maxLength: 128
                  description: Улица и номер дома
                  example: ул. Ленина, 123
                zip_code:
                  type: string
                  maxLength: 32
                  description: Почтовый индекс
                  example: "101000"
                city:
                  type: string
                  maxLength: 32
                  description: Город
                  example: Москва
                state:
                  type: string
                  maxLength: 32
                  description: Штат / регион
                  example: Московская область
                country:
                  type: object
                  required:
                    - name
                    - alpha2
                    - alpha3
                  properties:
                    name:
                      type: string
                      maxLength: 32
                      description: Название страны
                      example: Россия
                    alpha2:
                      type: string
                      minLength: 2
                      maxLength: 2
                      description: Код страны ISO 3166-1 alpha-2
                      example: RU
                    alpha3:
                      type: string
                      minLength: 3
                      maxLength: 3
                      description: Код страны ISO 3166-1 alpha-3
                      example: RUS

    UserLoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    TokenRefreshRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token:
          type: string

    TokenResponse:
      type: object
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        expires_in:
          type: integer
        token_type:
          type: string
          example: Bearer

    UserInfoResponse:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
        roles:
          type: array
          items:
            type: string
        created_at:
          type: string
          format: date-time

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        status:
          type: integer